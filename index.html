<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- At Fielt Extension Hub — NIET VERWIJDEREN (zie atfielt-extension-hub/HUB-INTEGRATION.md) -->
<script src="https://atfielt-extension-hub.tom-da0.workers.dev/client.js"></script>

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --af:#D4821A;--af2:#8a5410;--afl:#F5E6D6;
    --dk:#222;--gr:#F5F0EA;--afs:#F5E6D6;
    --ok:#2d6a4f;--okbg:#d4edda;--info:#004085;--infobg:#cce5ff;--warn:#a34020;
    --g1:#F9F9F9;--g2:#F5F0EA;--g3:#999999;--g4:#7F8C8D;--g5:#555555;--g6:#333333;
    --hl-light:#e8e2d8;--hl:#d6cdc0;
    --r-sm:8px;--r-md:12px;--r-lg:16px;--r-pill:999px;
    --s1:4px;--s2:8px;--s3:12px;--s4:16px;--s5:24px;
    --fs-xs:11px;--fs-sm:12px;--fs-md:13px;--fs-lg:15px;
    /* Legacy aliassen zodat oude selectors blijven werken */
    --af-oranje:var(--af);--af-oranje-hover:var(--af2);--af-oranje-licht:var(--afl);
    --af-donker:var(--dk);--af-grijs:var(--gr);--af-lijn:var(--hl-light);
    --af-groen:var(--ok);--af-rood:var(--warn);
  }
  body{font-family:'Poppins',system-ui,-apple-system,sans-serif;background:#fff;color:var(--dk);min-height:100vh;font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
  h1,h2,h3,h4{font-family:'Montserrat',system-ui,sans-serif;letter-spacing:-.02em;color:var(--dk)}
  h1 em,h2 em,h3 em,h4 em,.accent{font-style:normal;color:var(--af)}

  /* Donkere sticky header (1:1 met tc-viewer) */
  .hdr{background:var(--dk);color:#fff;padding:var(--s3) var(--s5);display:flex;align-items:center;gap:var(--s2);box-shadow:0 2px 8px rgba(0,0,0,.15);position:sticky;top:0;z-index:100}
  .hdr h1{font-family:'Montserrat',sans-serif;font-size:var(--fs-lg);font-weight:700;white-space:nowrap;color:#fff}
  .hdr h1 em{color:var(--af);font-weight:700}
  .hdr .sub{font-size:var(--fs-sm);color:var(--af);margin-left:var(--s1);font-weight:600}
  .hdr .info{font-size:var(--fs-sm);color:rgba(255,255,255,.85);margin-left:var(--s3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .hdr .spacer{flex:1}
  .hdr button{padding:6px var(--s3);border:none;border-radius:var(--r-pill);font-size:var(--fs-sm);font-weight:500;cursor:pointer;font-family:'Poppins',sans-serif;transition:all .15s}
  .hdr .action-btn.sec{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.2);font-weight:500}
  .hdr .action-btn.sec:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.35)}

  .loading,.fatal{padding:40px;text-align:center;color:var(--g5);font-size:var(--fs-md)}
  .fatal{color:var(--warn)}
  .app{padding:var(--s5);max-width:960px;margin:0 auto}
  .subtitle{color:var(--g5);margin:0 0 var(--s5);font-size:var(--fs-md)}

  /* Drop zone */
  .dropzone{border:2px dashed var(--hl);border-radius:var(--r-md);padding:44px var(--s5);text-align:center;background:#fff;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.04)}
  .dropzone:hover,.dropzone.drag{border-color:var(--af);background:var(--afl)}
  .dropzone p{margin:var(--s1) 0}
  .dropzone .hint{color:var(--g4);font-size:var(--fs-sm)}
  .dropzone input[type=file]{display:none}
  .dropzone .pick-btn{background:var(--af);color:#fff;border:none;padding:10px 24px;border-radius:var(--r-pill);font-weight:600;cursor:pointer;font-size:var(--fs-md);margin-top:var(--s3);font-family:'Montserrat',sans-serif;box-shadow:0 6px 18px rgba(212,130,26,.25);transition:all .2s}
  .dropzone .pick-btn:hover{background:var(--af2);box-shadow:0 8px 22px rgba(212,130,26,.3)}

  /* Queue */
  .queue{margin-top:var(--s5)}
  .queue-item{background:#fff;border:1px solid var(--hl-light);border-radius:var(--r-md);padding:var(--s4);margin-bottom:var(--s3);box-shadow:0 2px 8px rgba(0,0,0,.04);transition:box-shadow .15s}
  .queue-item:hover{box-shadow:0 4px 14px rgba(0,0,0,.07)}
  .queue-head{display:flex;justify-content:space-between;align-items:center;gap:var(--s3)}
  .queue-name{font-family:'Montserrat',sans-serif;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:var(--fs-md)}
  .queue-size{color:var(--g4);font-size:var(--fs-sm);white-space:nowrap}
  .queue-remove{background:none;border:none;color:var(--g4);cursor:pointer;font-size:20px;line-height:1;padding:0 var(--s1)}
  .queue-remove:hover{color:var(--warn)}
  .queue-body{margin-top:var(--s3)}
  .queue-body label{display:block;font-size:var(--fs-xs);color:var(--g5);margin:var(--s2) 0 var(--s1);text-transform:uppercase;letter-spacing:.4px;font-weight:600;font-family:'Montserrat',sans-serif}
  .queue-body input[type=text],.queue-body textarea,.queue-body select{width:100%;padding:8px 10px;border:1px solid var(--hl);border-radius:var(--r-sm);font-family:'Poppins',sans-serif;font-size:var(--fs-md);background:#fff;color:var(--dk);outline:none;transition:border-color .15s}
  .queue-body input[type=text]:focus,.queue-body textarea:focus,.queue-body select:focus{border-color:var(--af)}
  .queue-body textarea{resize:vertical;min-height:54px}
  .suggestion{font-size:var(--fs-xs);color:var(--af);margin-top:var(--s1);font-weight:500}

  /* Progress + status */
  .progress{height:6px;background:var(--g2);border-radius:3px;margin-top:var(--s3);overflow:hidden}
  .progress-bar{height:100%;background:var(--af);width:0%;transition:width .2s}
  .status{font-size:var(--fs-sm);margin-top:var(--s2);padding:6px var(--s3);border-radius:var(--r-sm);display:inline-block;font-weight:500}
  .status.ok{color:var(--ok);background:var(--okbg)}
  .status.err{color:var(--warn);background:#fde8e8}
  .status.warn{color:#7a5c00;background:#fff3cd}
  .status.info{color:var(--info);background:var(--infobg)}

  /* Metadata-grid */
  .meta-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:var(--s2);margin-top:var(--s2)}
  .meta-row>div{min-width:0}
  .meta-row label{display:flex;align-items:center;gap:var(--s1);margin:0 0 var(--s1);font-size:var(--fs-xs);color:var(--g5);text-transform:uppercase;letter-spacing:.4px;font-weight:600;font-family:'Montserrat',sans-serif}
  .meta-row .warn-icon{color:#d18000;font-size:var(--fs-md);line-height:1}
  .meta-row select.warn-select{border-color:#e0b65c;background:#fffbe9}
  .meta-row select[data-auto="1"]{color:var(--af);font-weight:500}

  /* Folder-picker (shortlist + zoekveld) */
  .folder-picker{margin-top:var(--s1)}
  .folder-current{display:flex;align-items:center;justify-content:space-between;gap:var(--s2);padding:10px var(--s3);background:var(--afl);border-left:3px solid var(--af);border-radius:var(--r-sm);font-size:var(--fs-md);margin-bottom:var(--s2)}
  .folder-current .path{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--dk);font-weight:500}
  .folder-current .change-btn{background:#fff;border:1px solid var(--hl);padding:5px 12px;border-radius:var(--r-pill);cursor:pointer;font-size:var(--fs-sm);color:var(--g5);white-space:nowrap;font-family:'Poppins',sans-serif;transition:all .15s}
  .folder-current .change-btn:hover{border-color:var(--af);color:var(--af)}
  .folder-list{margin-top:var(--s1);border:1px solid var(--hl-light);border-radius:var(--r-sm);overflow:hidden;background:#fff}
  .folder-option{padding:8px var(--s3);cursor:pointer;font-size:var(--fs-sm);color:var(--g5);border-bottom:1px solid var(--hl-light);transition:background .1s;display:flex;align-items:center;gap:var(--s2);line-height:1.4}
  .folder-option:last-child{border-bottom:none}
  .folder-option span:first-child{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .folder-option:hover{background:var(--afl);color:var(--dk)}
  .folder-option.selected{background:var(--afl);color:var(--af);font-weight:600}
  .folder-option .badge{display:inline-block;padding:1px 8px;border-radius:var(--r-pill);font-size:10px;letter-spacing:.5px;background:var(--af);color:#fff;font-weight:700;font-family:'Montserrat',sans-serif}
  .folder-search{margin-top:var(--s2);width:100%;padding:8px 10px;border:1px solid var(--hl);border-radius:var(--r-sm);font:inherit;background:#fff;outline:none;transition:border-color .15s}
  .folder-search:focus{border-color:var(--af)}
  .folder-hint{font-size:var(--fs-xs);color:var(--g4);margin-top:var(--s1)}

  /* Path-preview */
  .path-preview{font-size:var(--fs-sm);color:var(--g5);margin-top:var(--s2);padding:var(--s2) var(--s3);background:var(--gr);border-left:3px solid var(--af);border-radius:var(--r-sm);line-height:1.5}
  .path-preview strong{color:var(--dk);font-weight:600}
  .path-preview .auto-tag{color:var(--af);font-weight:500}
  .path-preview .missing-tag{color:#7a5c00}

  /* Header met tandwiel (binnen app-container, naast titel) */
  .app-head{display:flex;justify-content:space-between;align-items:flex-start;gap:var(--s3)}
  .app-head-text{flex:1;min-width:0}
  .cfg-btn{background:transparent;border:1px solid var(--hl);border-radius:var(--r-sm);padding:8px 14px;cursor:pointer;font-size:var(--fs-md);color:var(--g5);white-space:nowrap;font-family:'Poppins',sans-serif;transition:all .15s}
  .cfg-btn:hover{background:var(--gr);color:var(--dk);border-color:var(--af)}

  /* Modal */
  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-start;justify-content:center;padding:40px var(--s4);z-index:1000;backdrop-filter:blur(2px)}
  .modal{background:#fff;border-radius:var(--r-lg);max-width:640px;width:100%;padding:var(--s5);box-shadow:0 12px 40px rgba(0,0,0,.22);max-height:calc(100vh - 80px);overflow-y:auto}
  .modal h2{font-family:'Montserrat',sans-serif;margin:0 0 var(--s1);font-size:20px;font-weight:700}
  .modal .sub{color:var(--g5);font-size:var(--fs-sm);margin:0 0 var(--s4)}
  .rule-row{display:grid;grid-template-columns:100px 1fr 40px;gap:var(--s2);align-items:center;margin-bottom:var(--s2)}
  .rule-row input,.rule-row select{padding:8px 10px;border:1px solid var(--hl);border-radius:var(--r-sm);font-size:var(--fs-md);width:100%;background:#fff;font-family:'Poppins',sans-serif;color:var(--dk);outline:none}
  .rule-row input:focus,.rule-row select:focus{border-color:var(--af)}
  .rule-del{background:transparent;border:1px solid var(--hl);color:var(--g4);border-radius:var(--r-sm);padding:6px 8px;cursor:pointer;font-size:15px;transition:all .15s}
  .rule-del:hover{color:var(--warn);border-color:var(--warn)}
  .modal-actions{margin-top:var(--s4);display:flex;justify-content:flex-end;gap:var(--s2)}
  .modal .add-rule{background:transparent;border:1.5px dashed var(--hl);border-radius:var(--r-sm);padding:8px var(--s3);cursor:pointer;font-size:var(--fs-md);color:var(--g5);margin-top:var(--s1);font-family:'Poppins',sans-serif;transition:all .15s}
  .modal .add-rule:hover{border-color:var(--af);color:var(--af)}

  /* Actions — primary/ghost buttons (pill) */
  .actions{display:flex;gap:var(--s3);justify-content:flex-end;margin-top:var(--s5)}
  .btn{padding:10px 24px;border:none;border-radius:var(--r-pill);font-weight:600;cursor:pointer;font-size:var(--fs-md);font-family:'Montserrat',sans-serif;transition:all .2s}
  .btn-primary{background:var(--af);color:#fff;box-shadow:0 6px 18px rgba(212,130,26,.25)}
  .btn-primary:hover:not(:disabled){background:var(--af2);box-shadow:0 8px 22px rgba(212,130,26,.3)}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed;box-shadow:none}
  .btn-ghost{background:transparent;color:var(--g5);border:1px solid var(--hl)}
  .btn-ghost:hover{background:var(--gr);color:var(--dk)}

  .empty-state{text-align:center;color:var(--g4);padding:40px var(--s5)}
  .warn{background:#fff8e8;border:1px solid #e8d89c;border-left:4px solid var(--af);color:#7a5c00;padding:var(--s3) var(--s4);border-radius:var(--r-sm);margin:var(--s4) 0;font-size:var(--fs-md)}
</style>
</head>
<body>

<header class="hdr" id="hdr" style="display:none">
  <h1>Project<em>informatie</em></h1>
  <span class="sub">toevoegen</span>
  <span class="info" id="hdr-project"></span>
  <span class="spacer"></span>
  <button class="action-btn sec" id="cfg-btn" type="button" title="Metadata-regels instellen">⚙ Instellingen</button>
</header>
<div id="loading" class="loading">Laden…</div>
<div id="app" class="app" style="display:none"></div>

<script>
// ============================================================
//  SLUG — moet overeenkomen met extensions.slug in de hub DB
// ============================================================
const EXTENSION_SLUG = 'project-upload';

// ============================================================
//  Trimble API region → base URL
// ============================================================
const TC_API_REGIONS = {
  europe: 'https://app21.connect.trimble.com/tc/api/2.0',
  'north america': 'https://app.connect.trimble.com/tc/api/2.0',
  asia: 'https://app31.connect.trimble.com/tc/api/2.0',
};
let TC_API_BASE = TC_API_REGIONS.europe;

// Gedeelde proxy — zelfde als tc-viewer (productie-stabiel, CORS-veilig voor zware calls)
const PROXY_BASE_URL = 'https://tc-proxy.tom-da0.workers.dev';
const PSET_REGIONS = {
  europe: PROXY_BASE_URL + '/pset/eu',
  'north america': PROXY_BASE_URL + '/pset/us',
  asia: PROXY_BASE_URL + '/pset/ap',
};
// TC REST proxy: /tc/{eu|us|ap}/{path} — gebruikt voor file-uploads (POST /files krijgt
// in sommige browsers CORS-fout op app21.connect.trimble.com)
const TC_PROXY_REGIONS = {
  europe: PROXY_BASE_URL + '/tc/eu',
  'north america': PROXY_BASE_URL + '/tc/us',
  asia: PROXY_BASE_URL + '/tc/ap',
};
let PSET_BASE = PSET_REGIONS.europe;
let TC_PROXY_BASE = TC_PROXY_REGIONS.europe;

// Hub endpoint voor project-config (regels voor pad → metadata)
const HUB_CONFIG_URL = 'https://atfielt-extension-hub.tom-da0.workers.dev/api/extension-config';

// PSet property-UUIDs (fallback — overgenomen uit tc-viewer L1266-1283, VW BVGO schema)
const PROP_UUIDS = {
  discipline:      '202e0b40-055c-11ea-9ee0-4f66993176e1',
  project_fase:    'c83d7d90-055a-11ea-9ee0-4f66993176e1',
  document_status: 'cbc46730-41af-11ea-9125-af458cfb61c4',
  document_datum:  '79715f10-055a-11ea-9ee0-4f66993176e1',
};

// Toegestane waarden per veld (fallback — overgenomen uit tc-viewer L2382-2386)
const ENUM_VALUES = {
  discipline: ['Opdrachtgever','Architect','Constructeur','Installateur','Adviseur','Hoofdaannemer','Onderaannemer','Leverancier','Overheid','Nuts','Directievoering','Overig'],
  project_fase: ['Initiatief','Project definitie','Structuur ontwerp','Voorlopig ontwerp','Definitief ontwerp','Technisch ontwerp','Prijs en contractvorming','Uitvoeringsgereed ontwerp','Realisatie','Gebruik en exploitatie','Project (alle fasen)'],
  document_status: ['Concept','Voorlopig','Definitief','Vervallen','Voor ontwerp','Voor uitvoering','As built','Intern'],
};

const FIELD_LABEL = {
  discipline: 'Discipline',
  project_fase: 'Fase',
  document_status: 'Status',
};

const METADATA_FIELDS = ['discipline', 'project_fase', 'document_status'];

// Permissions die expliciet read-only zijn — alle andere/lege waardes zien we als potentieel schrijfbaar.
// Als TC later 403 teruggeeft bij upload handelt uploadFile() dat af.
const DENY_LEVELS = new Set(['READ', 'READONLY', 'NONE', 'VIEW', 'VIEWER', 'DENY']);

let tcAPI = null;
let tcToken = null;
let tcProject = null;
let writableFolders = []; // [{id, name, path, depth}]
let queue = []; // [{id, file, description, folderId, folderAuto, folderShortlist, folderSearch, folderPickerOpen, progress, status, error, warn, metadata, metadataAuto}]
let nextQueueId = 1;
let uploadConfig = { rules: [] }; // { rules: [{ depth, field, map? }] }
let _psetStats = { ok: 0, fail: 0 };

// ============================================================
//  Init
// ============================================================
async function init() {
  console.log('[upload] BUILD:', window.__BUILD_VERSION__ || 'unknown');
  const apiLib = await waitForWorkspaceAPI(10000);
  tcAPI = await apiLib.connect(window.parent, function (event, data) {
    if (data && (data.type === 'token' || event === 'extension.accessToken')) {
      const t = (typeof data === 'string') ? data : (data.token || data.accessToken || null);
      if (t && t.length > 20) tcToken = t;
    }
  }, 15000);

  tcProject = await tcAPI.project.getCurrentProject();

  // Registreer sidebar menu-item — zonder deze call verschijnt er niks in het TC menu
  const menuDef = {
    title: 'Projectinformatie toevoegen',
    icon: 'https://tomtietom.github.io/trimble-project-upload/icon.png',
    command: 'open_project_upload'
  };
  try {
    if (tcAPI.ui && typeof tcAPI.ui.setMenu === 'function') {
      tcAPI.ui.setMenu(menuDef);
      console.log('[upload] menu geregistreerd via tcAPI.ui.setMenu');
    } else if (tcAPI.extension && typeof tcAPI.extension.setMenu === 'function') {
      tcAPI.extension.setMenu(menuDef);
      console.log('[upload] menu geregistreerd via tcAPI.extension.setMenu');
    } else {
      console.warn('[upload] setMenu API niet gevonden op tcAPI');
    }
  } catch (e) {
    console.warn('[upload] menu registreren mislukt:', e.message);
  }

  const loc = (tcProject.location || 'europe').toLowerCase();
  if (loc.includes('america') || loc.includes('north')) {
    TC_API_BASE = TC_API_REGIONS['north america'];
    PSET_BASE = PSET_REGIONS['north america'];
    TC_PROXY_BASE = TC_PROXY_REGIONS['north america'];
  } else if (loc.includes('asia')) {
    TC_API_BASE = TC_API_REGIONS.asia;
    PSET_BASE = PSET_REGIONS.asia;
    TC_PROXY_BASE = TC_PROXY_REGIONS.asia;
  } else {
    TC_API_BASE = TC_API_REGIONS.europe;
    PSET_BASE = PSET_REGIONS.europe;
    TC_PROXY_BASE = TC_PROXY_REGIONS.europe;
  }
  console.log('[upload] region:', loc, '| TC_API_BASE:', TC_API_BASE, '| PSET_BASE:', PSET_BASE, '| TC_PROXY_BASE:', TC_PROXY_BASE);

  if (!tcToken) {
    try {
      const r = await Promise.race([
        tcAPI.extension.requestPermission('accesstoken'),
        new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 5000))
      ]);
      if (typeof r === 'string' && r.length > 20) tcToken = r;
      else if (r && r.token) tcToken = r.token;
    } catch (e) { console.warn('[TC] requestPermission faalde:', e.message); }
  }
  if (!tcToken && tcAPI.extension?.getAccessToken) {
    try { const t = await tcAPI.extension.getAccessToken(); if (t && t.length > 20) tcToken = t; } catch (e) {}
  }
  if (!tcToken) throw new Error('Geen access token ontvangen van Trimble');
  _tcTokenExp = _parseTokenExp(tcToken);

  // ╔══════════════════════════════════════════════════════════╗
  // ║  AT FIELT EXTENSION HUB — NIET VERWIJDEREN               ║
  // ╚══════════════════════════════════════════════════════════╝
  if (!window.atfieltHub) {
    document.body.innerHTML = '<div class="fatal">At Fielt Hub kon niet geladen worden. Controleer je internetverbinding en herlaad.<br><br><a href="mailto:info@atfielt.nl">info@atfielt.nl</a></div>';
    throw new Error('Hub client niet geladen');
  }
  await window.atfieltHub.check({
    slug: EXTENSION_SLUG,
    tcToken: tcToken,
    tcProject: tcProject,
    apiBase: TC_API_BASE,
  });
  // ╔══════════════════════════════════════════════════════════╗
  // ║  EINDE AT FIELT HUB BLOK                                 ║
  // ╚══════════════════════════════════════════════════════════╝

  // Folder-tree ophalen en filteren op schrijfrechten
  document.getElementById('loading').textContent = 'Mappen ophalen en rechten controleren…';
  writableFolders = await fetchWritableFolders();

  // Project-config voor pad-naar-metadata-regels
  await loadUploadConfig();

  if (window.atfieltHub) {
    // data-loaded als feature-action (hub accepteert alleen type='feature' of 'error')
    window.atfieltHub.logEvent('feature', {
      action: 'data-loaded',
      writableFolders: writableFolders.length,
      configRules: uploadConfig.rules.length,
      region: (tcProject.location || 'europe').toLowerCase(),
    });
  }

  renderApp();
}

// ============================================================
//  Config uit Extension Hub (regels depth → metadata-veld)
//  Hub-sessietoken staat in sessionStorage onder 'atfielt-hub-session'
//  (gezet door window.atfieltHub.check) — meesturen als X-Session header.
// ============================================================
const HUB_SESSION_STORAGE_KEY = 'atfielt-hub-session';

function getHubSessionToken() {
  try { return sessionStorage.getItem(HUB_SESSION_STORAGE_KEY) || ''; }
  catch (_) { return ''; }
}

async function loadUploadConfig() {
  try {
    const url = HUB_CONFIG_URL + '?slug=' + encodeURIComponent(EXTENSION_SLUG)
      + '&project=' + encodeURIComponent(tcProject.id) + '&key=metadata-rules';
    const headers = { 'Accept': 'application/json' };
    const session = getHubSessionToken();
    if (session) headers['X-Session'] = session;
    else console.warn('[upload] geen hub-sessietoken in sessionStorage — config-lezen werkt mogelijk niet');
    const r = await fetchWithTimeout(url, { headers: headers }, 10000);
    if (r.status === 404) { console.log('[upload] config nog niet ingesteld — default rules'); return; }
    if (r.status === 401) { console.warn('[upload] config 401 — sessietoken ontbreekt/verlopen; default rules'); return; }
    if (!r.ok) { console.warn('[upload] config-fetch fout:', r.status); return; }
    const body = await r.json().catch(() => null);
    // Hub geeft value terug als object of als JSON-string — handle beide
    let cfg = body && (body.value || body.config || body);
    if (typeof cfg === 'string') { try { cfg = JSON.parse(cfg); } catch (_) { cfg = null; } }
    if (cfg && Array.isArray(cfg.rules)) {
      uploadConfig.rules = cfg.rules.filter(r => r && Number.isFinite(r.depth) && METADATA_FIELDS.indexOf(r.field) >= 0);
      console.log('[upload] config geladen:', uploadConfig.rules.length, 'regels', uploadConfig.rules);
    }
  } catch (e) {
    console.warn('[upload] config laden mislukt:', e.message);
  }
}

async function saveUploadConfig() {
  const body = {
    slug: EXTENSION_SLUG,
    project: tcProject.id,
    key: 'metadata-rules',
    value: { rules: uploadConfig.rules },
    tcToken: tcToken,
  };
  const headers = { 'Content-Type': 'application/json' };
  const session = getHubSessionToken();
  if (session) headers['X-Session'] = session;
  else throw new Error('Geen geldige hub-sessie — herlaad de extensie.');
  const r = await fetchWithTimeout(HUB_CONFIG_URL, {
    method: 'POST',
    headers: headers,
    body: JSON.stringify(body),
  }, 15000);
  if (r.status === 401) throw new Error('Sessie verlopen — herlaad de extensie.');
  if (r.status === 403) throw new Error('Alleen projectbeheerders mogen deze regels wijzigen.');
  if (!r.ok) {
    const t = await r.text().catch(() => '');
    throw new Error('Opslaan mislukt (' + r.status + ') ' + t.slice(0, 200));
  }
  return true;
}

// ============================================================
//  Token refresh helpers
// ============================================================
let _tcTokenExp = null; // Unix timestamp (seconds)

function _parseTokenExp(t) {
  try { const p = JSON.parse(atob(t.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); return p.exp || null; } catch(e) { return null; }
}

function _isTokenExpired() {
  if (!_tcTokenExp) return false;
  return Date.now() >= (_tcTokenExp * 1000) - 60000;
}

async function _ensureValidToken() {
  if (!_isTokenExpired()) return;
  console.log('[TC] Token verlopen, vernieuwen...');
  if (tcAPI && tcAPI.extension) {
    try {
      var newToken = null;
      if (tcAPI.extension.getAccessToken) {
        newToken = await Promise.race([tcAPI.extension.getAccessToken(), new Promise(function(_,rej){setTimeout(function(){rej(new Error('timeout'));},5000);})]);
      }
      if (!newToken && tcAPI.extension.requestPermission) {
        var result = await Promise.race([tcAPI.extension.requestPermission('accesstoken'), new Promise(function(_,rej){setTimeout(function(){rej(new Error('timeout'));},5000);})]);
        if (typeof result === 'string') newToken = result;
        else if (result && result.token) newToken = result.token;
        else if (result && result.accessToken) newToken = result.accessToken;
      }
      if (newToken && newToken.length > 20) {
        tcToken = newToken;
        _tcTokenExp = _parseTokenExp(tcToken);
        console.log('[TC] Token vernieuwd');
        return;
      }
    } catch(e) { console.warn('[TC] Token refresh mislukt:', e.message); }
    throw new Error('Token verlopen — sluit de extensie en open deze opnieuw.');
  }
  throw new Error('Token verlopen.');
}

function fetchWithTimeout(url, options, timeoutMs) {
  timeoutMs = timeoutMs || 15000;
  var controller = new AbortController();
  var id = setTimeout(function() { controller.abort(); }, timeoutMs);
  return fetch(url, Object.assign({}, options, { signal: controller.signal }))
    .catch(function(err) {
      if (err.name === 'AbortError') throw new Error('Verbinding time-out (' + Math.round(timeoutMs/1000) + 's). Controleer je internetverbinding.');
      throw err;
    })
    .finally(function() { clearTimeout(id); });
}

// ============================================================
//  TC fetch helper
// ============================================================
async function tcFetch(path, opts) {
  await _ensureValidToken();
  opts = opts || {};
  const headers = Object.assign({
    Authorization: 'Bearer ' + tcToken,
    Accept: 'application/json',
  }, opts.headers || {});
  var r = await fetchWithTimeout(TC_API_BASE + path, {
    method: opts.method || 'GET',
    headers: headers,
    body: opts.body,
  });
  if (r.status === 401) {
    await _ensureValidToken();
    r = await fetchWithTimeout(TC_API_BASE + path, { method: opts.method || 'GET', headers: Object.assign({}, headers, { Authorization: 'Bearer ' + tcToken }), body: opts.body });
  }
  if (!r.ok) {
    const txt = await r.text().catch(() => '');
    throw new Error('TC API ' + r.status + ' ' + path + ' — ' + txt.slice(0, 200));
  }
  if (opts.raw) return r;
  return r.json();
}

// ============================================================
//  PSet fetch helper — voor Trimble Property Set API
// ============================================================
async function tcFetchPSet(path, opts) {
  await _ensureValidToken();
  opts = opts || {};
  const headers = Object.assign({
    Authorization: 'Bearer ' + tcToken,
    Accept: 'application/json',
  }, opts.headers || {});
  var r = await fetchWithTimeout(PSET_BASE + path, {
    method: opts.method || 'GET',
    headers: headers,
    body: opts.body,
  });
  if (r.status === 401) {
    await _ensureValidToken();
    r = await fetchWithTimeout(PSET_BASE + path, { method: opts.method || 'GET', headers: Object.assign({}, headers, { Authorization: 'Bearer ' + tcToken }), body: opts.body });
  }
  if (!r.ok) {
    const txt = await r.text().catch(() => '');
    throw new Error('PSet ' + r.status + ' ' + path + ' — ' + txt.slice(0, 200));
  }
  if (opts.raw) return r;
  if (r.status === 204) return null;
  const txt = await r.text();
  if (!txt) return null;
  try { return JSON.parse(txt); } catch (_) { return txt; }
}

// ============================================================
//  Folder tree + schrijfrechten filter
//  (Recursief via /folders/{id}/items — dit is de enige TC-endpoint met CORS
//   support vanaf https://tomtietom.github.io; /folders?projectId= geeft CORS-fout.)
// ============================================================
async function fetchWritableFolders() {
  // Root folder ID ophalen
  let rootId = null;
  try {
    const proj = await tcFetch('/projects/' + tcProject.id);
    rootId = proj.rootId || proj.rootFolderId || proj.rootFolder?.id || proj.root?.id;
  } catch (e) {
    console.warn('[upload] /projects/{id} mislukt:', e.message);
  }
  if (!rootId) throw new Error('Root folder niet gevonden op project');
  console.log('[upload] root folder:', rootId);

  // Root als eerste optie (uploaden naar projectroot)
  const result = [{
    id: rootId,
    name: tcProject.name || 'Projectroot',
    path: '(projectroot)',
    depth: 0,
  }];

  let queueList = [{ id: rootId, path: [] }];
  const PARALLEL = 50; // oud patroon met 20 duurde ~60s; 50 = ~24s voor 2300 folders

  while (queueList.length) {
    const batch = queueList.splice(0, PARALLEL);
    const batchResults = await Promise.all(batch.map(async ({ id, path }) => {
      try {
        const items = await tcFetch('/folders/' + id + '/items');
        return { path, items: Array.isArray(items) ? items : (items.items || []) };
      } catch (e) {
        console.warn('[upload] folder items mislukt:', id, e.message);
        return { path, items: [] };
      }
    }));

    for (const { path, items } of batchResults) {
      const folders = items.filter(it => (it.type || '').toUpperCase() === 'FOLDER');
      for (const f of folders) {
        const currentPath = path.concat(f.name || '(naamloos)');
        const rawPerm = f.permission || f.accessLevel || f.access || f.accessRights || f.role || '';
        const permStr = (typeof rawPerm === 'object' ? (rawPerm.type || rawPerm.level || '') : rawPerm).toString().toUpperCase();
        const canWrite = !DENY_LEVELS.has(permStr);
        if (canWrite) {
          result.push({
            id: f.id,
            name: f.name || '(naamloos)',
            path: currentPath.join(' / '),
            depth: currentPath.length,
          });
        }
        queueList.push({ id: f.id, path: currentPath });
      }
    }
  }

  console.log('[upload] writable folders:', result.length);
  result.sort((a, b) => a.path.localeCompare(b.path, 'nl'));
  return result;
}

// (Oude paginated fetchAllProjectFolders is verwijderd — /folders?projectId= heeft geen
// CORS headers vanaf tomtietom.github.io. We gebruiken weer recursieve /folders/{id}/items.)

// ============================================================
//  Plaatsingsvoorstel — fuzzy match op metadata + filename
// ============================================================
const NL_STOPWORDS = new Set(['de','het','een','van','voor','en','of','in','op','te','aan','bij','met','tot','uit','naar','door']);

function tokenize(s) {
  return String(s || '')
    .toLowerCase()
    .replace(/[^a-z0-9àáâäèéêëìíîïòóôöùúûü\s]/gi, ' ')
    .split(/\s+/)
    .filter(w => w.length >= 3 && !NL_STOPWORDS.has(w));
}

// Strip leidende nummers, prefixes, placeholders zodat "3.2 Voorlopig ontwerp" → "voorlopig ontwerp"
function normalizeFolderPart(s) {
  return String(s || '')
    .toLowerCase()
    .replace(/^[\d\.\-\s_]+/, '')
    .replace(/\[naam\]/g, '')
    .replace(/\([^)]*\)/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

// Score één folder tegen een item (metadata + bestandsnaam + description)
function scoreFolder(folder, item) {
  if (!folder || folder.path === '(projectroot)') return 0;
  const parts = folder.path.split(' / ').map(normalizeFolderPart);
  let score = 0;

  // Per ingevuld metadata-veld: substring-match in path-component
  for (const f of METADATA_FIELDS) {
    const val = (item.metadata[f] || '').toLowerCase().trim();
    if (!val) continue;
    let best = 0;
    for (const p of parts) {
      if (!p) continue;
      if (p === val) { best = Math.max(best, 15); break; }
      if (p.includes(val) || val.includes(p)) best = Math.max(best, 10);
    }
    score += best;
  }

  // Bestandsnaam- + description-tokens als secundair signaal
  const extraTokens = [...new Set([
    ...tokenize((item.file && item.file.name) ? item.file.name.replace(/\.[^.]+$/, '') : ''),
    ...tokenize(item.description),
  ])];
  const nameLower = folder.name.toLowerCase();
  const pathLower = folder.path.toLowerCase();
  for (const tok of extraTokens) {
    if (nameLower.includes(tok)) score += 3;
    else if (pathLower.includes(tok)) score += 1;
  }

  // Diepere folders zijn specifieker → lichte bonus
  if (score > 0) score += Math.min(folder.depth, 6) * 0.3;
  return score;
}

// Score alle writable folders, sorteer, retourneer top-N met score
function scoreFolders(item, limit) {
  limit = limit || 8;
  const out = [];
  for (const f of writableFolders) {
    const s = scoreFolder(f, item);
    if (s > 0) out.push({ folder: f, score: s });
  }
  out.sort((a, b) => b.score - a.score);
  return out.slice(0, limit);
}

// Substring-filter (alle tokens moeten voorkomen in pad)
function filterFolders(query, limit) {
  limit = limit || 10;
  const q = String(query || '').trim().toLowerCase();
  if (!q) return [];
  const tokens = q.split(/\s+/).filter(Boolean);
  const out = [];
  for (const f of writableFolders) {
    const p = (f.path || '').toLowerCase();
    if (tokens.every(t => p.includes(t))) {
      out.push(f);
      if (out.length >= limit) break;
    }
  }
  return out;
}

// Herbereken shortlist + update top-1 alleen als user nog niet handmatig koos
function recomputeFolderSuggestion(item) {
  item.folderShortlist = scoreFolders(item);
  if (item.folderAuto) {
    item.folderId = item.folderShortlist[0] ? item.folderShortlist[0].folder.id : null;
  }
}

// ============================================================
//  Metadata-suggestie uit folder-pad (op basis van uploadConfig.rules)
// ============================================================
function applyMetadataSuggestion(item) {
  const folder = writableFolders.find(f => f.id === item.folderId);
  if (!folder) return;
  // Path-componenten excl. '(projectroot)'
  const parts = (folder.path && folder.path !== '(projectroot)')
    ? folder.path.split(' / ').map(s => s.trim()).filter(Boolean)
    : [];
  for (const rule of (uploadConfig.rules || [])) {
    const idx = (rule.depth | 0) - 1; // 1-indexed
    if (idx < 0 || idx >= parts.length) continue;
    const field = rule.field;
    if (METADATA_FIELDS.indexOf(field) < 0) continue;
    // Respecteer door user handmatig gezette waarden
    if (item.metadata[field] && !item.metadataAuto[field]) continue;
    const raw = parts[idx];
    const mapped = (rule.map && rule.map[raw]) ? rule.map[raw] : raw;
    // Case-insensitive match tegen enum, retourneer canonieke casing
    const match = (ENUM_VALUES[field] || []).find(v => v.toLowerCase() === String(mapped).toLowerCase());
    if (match) {
      item.metadata[field] = match;
      item.metadataAuto[field] = true;
    } else if (item.metadataAuto[field]) {
      // Eerder auto-ingevuld, nu niet meer matchbaar → leegmaken zodat warning verschijnt
      item.metadata[field] = '';
      item.metadataAuto[field] = false;
    }
  }
}

function isMetadataIncomplete(item) {
  return METADATA_FIELDS.some(f => !item.metadata[f]);
}

// ============================================================
//  Upload — TC 2-staps (JSON init → signed URL → PUT binary)
//  Init via POST /files/fs/upload (de dedicated "initiate upload" endpoint).
//  Response bevat een signed URL waar we de bytes heen PUTten.
// ============================================================
async function uploadFile(item) {
  item.status = 'uploading';
  item.progress = 3;
  renderQueue();

  const folder = writableFolders.find(f => f.id === item.folderId);
  if (!folder) throw new Error('Geen map geselecteerd');

  await _ensureValidToken();

  // Stap 1: init via POST /files/fs/upload?parentId=X&name=Y&size=Z met JSON-body
  // (TC weigert 'application/pdf' én 'application/octet-stream' op POST; alleen application/json passeert).
  // Response bevat uploadUrl (signed) + fileId/uploadId.
  const params = new URLSearchParams({
    parentId: folder.id,
    parentType: 'FOLDER',
    name: item.file.name,
    size: String(item.file.size),
  });
  const initPath = '/files/fs/upload?' + params.toString();
  console.log('[upload] init:', item.file.name, '| path:', initPath);

  let initData;
  try {
    initData = await tcFetch(initPath, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: '{}',
    });
    console.log('[upload] init response:', JSON.stringify(initData).slice(0, 500));
  } catch (e) {
    throw new Error('Init mislukt: ' + e.message);
  }

  const uploadUrl = initData.uploadUrl || initData.upload_url || initData.url || initData.signedUrl;
  const fileId = initData.id || initData.fileId || initData.versionId || initData.uploadId;
  if (!uploadUrl) {
    throw new Error('Geen uploadUrl in response. Keys: [' + Object.keys(initData || {}).join(', ') + '] | Full: ' + JSON.stringify(initData).slice(0, 400));
  }
  console.log('[upload] init OK | uploadUrl host:', uploadUrl.split('/')[2], '| fileId:', fileId);

  item.progress = 10;
  renderQueue();

  // Stap 2: PUT binary naar signed uploadUrl (geen Bearer — URL is al signed)
  await new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('PUT', uploadUrl);
    xhr.upload.onprogress = (e) => {
      if (e.lengthComputable) {
        item.progress = 10 + Math.round((e.loaded / e.total) * 85);
        renderQueue();
      }
    };
    xhr.onload = () => {
      if (xhr.status >= 200 && xhr.status < 300) resolve();
      else reject(new Error('PUT binary ' + xhr.status + ': ' + (xhr.responseText || '').slice(0, 200)));
    };
    xhr.onerror = () => reject(new Error('Netwerkfout tijdens binary-upload'));
    xhr.send(item.file);
  });

  item.progress = 100;
  item.fileId = fileId;
  console.log('[upload] done:', item.file.name, '| fileId:', fileId);

  // Metadata via PSet changeset (alleen als er velden zijn)
  const props = {};
  for (const f of METADATA_FIELDS) {
    const v = item.metadata[f];
    if (v && PROP_UUIDS[f]) props[PROP_UUIDS[f]] = v;
  }
  if (item.fileId && Object.keys(props).length) {
    item.status = 'saving-props';
    renderQueue();
    try {
      await tcFetchPSet('/psets/changeset', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          items: [{
            link: 'frn:tcfile:' + item.fileId,
            libId: 'tcproject:prod:' + tcProject.id,
            defId: 'tcfiles',
            props,
          }],
        }),
      });
      _psetStats.ok++;
      item.status = 'done';
      renderQueue();
    } catch (e) {
      console.warn('[upload] PSet save mislukt voor', item.file.name, e.message);
      _psetStats.fail++;
      item.warn = 'metadata niet opgeslagen: ' + e.message.slice(0, 120);
      item.status = 'done-warn';
      renderQueue();
    }
  } else {
    item.status = 'done';
    renderQueue();
  }
}

async function uploadAll() {
  const pending = queue.filter(i => i.status === 'pending' && i.folderId);
  if (!pending.length) return;

  const incomplete = pending.filter(isMetadataIncomplete);
  if (incomplete.length) {
    const msg = incomplete.length === 1
      ? '1 bestand heeft geen volledige metadata (discipline/fase/status). Toch uploaden?'
      : incomplete.length + ' bestanden hebben geen volledige metadata (discipline/fase/status). Toch uploaden?';
    if (!confirm(msg)) return;
  }

  document.getElementById('upload-btn').disabled = true;
  _psetStats = { ok: 0, fail: 0 };
  let ok = 0, fail = 0, totalBytes = 0;
  let metaComplete = 0, metaWarn = 0;

  for (const item of pending) {
    const wasComplete = !isMetadataIncomplete(item);
    try {
      await uploadFile(item);
      ok++;
      totalBytes += item.file.size;
      if (wasComplete) metaComplete++; else metaWarn++;
    } catch (e) {
      console.error('[upload] failed', item.file.name, e);
      item.status = 'error';
      item.error = e.message;
      fail++;
      renderQueue();
    }
  }

  document.getElementById('upload-btn').disabled = false;

  if (window.atfieltHub) {
    window.atfieltHub.logEvent('feature', {
      action: 'upload-batch',
      success: ok,
      failed: fail,
      bytes: totalBytes,
      metadataComplete: metaComplete,
      metadataWarn: metaWarn,
      psetOk: _psetStats.ok,
      psetFail: _psetStats.fail,
      configRules: uploadConfig.rules.length,
    });
  }
}

//  UI rendering
// ============================================================
function renderApp() {
  console.log('[upload] renderApp() called — writable folders:', writableFolders.length, '| DOM app element:', !!document.getElementById('app'));
  document.getElementById('loading').style.display = 'none';
  const hdr = document.getElementById('hdr');
  if (hdr) {
    hdr.style.display = '';
    document.getElementById('hdr-project').textContent = tcProject.name || '';
  }
  const app = document.getElementById('app');
  app.style.display = '';
  document.title = 'Projectinformatie toevoegen — At Fielt';

  const writableWarn = writableFolders.length === 0
    ? '<div class="warn">Je hebt nergens in dit project schrijfrechten. Neem contact op met de projectbeheerder.</div>'
    : '';

  app.innerHTML = `
    <p class="subtitle">${writableFolders.length} map${writableFolders.length === 1 ? '' : 'pen'} beschikbaar voor upload in <strong>${escapeHtml(tcProject.name)}</strong></p>
    ${writableWarn}
    <div class="dropzone" id="dropzone">
      <p><strong>Sleep bestanden hierheen</strong></p>
      <p class="hint">of</p>
      <button class="pick-btn" type="button" id="pick-btn">Kies bestanden</button>
      <input type="file" id="file-input" multiple>
    </div>
    <div class="queue" id="queue"></div>
    <div class="actions" id="actions" style="display:none">
      <button class="btn btn-ghost" id="clear-btn">Wissen</button>
      <button class="btn btn-primary" id="upload-btn">Uploaden</button>
    </div>
  `;

  const dz = document.getElementById('dropzone');
  const input = document.getElementById('file-input');
  document.getElementById('pick-btn').addEventListener('click', () => input.click());
  dz.addEventListener('click', (e) => {
    if (e.target.tagName !== 'BUTTON') input.click();
  });
  input.addEventListener('change', (e) => addFiles(e.target.files));

  dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.classList.add('drag'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
  dz.addEventListener('drop', (e) => {
    e.preventDefault();
    dz.classList.remove('drag');
    addFiles(e.dataTransfer.files);
  });

  document.getElementById('clear-btn').addEventListener('click', () => {
    queue = queue.filter(i => i.status === 'uploading');
    renderQueue();
  });
  document.getElementById('upload-btn').addEventListener('click', uploadAll);
  document.getElementById('cfg-btn').addEventListener('click', openConfigModal);
}

function addFiles(fileList) {
  if (!writableFolders.length) return;
  for (const f of fileList) {
    const item = {
      id: nextQueueId++,
      file: f,
      description: '',
      folderId: null,
      folderAuto: true,
      folderShortlist: [],
      folderSearch: '',
      folderPickerOpen: true,
      progress: 0,
      status: 'pending',
      error: null,
      warn: null,
      metadata: { discipline: '', project_fase: '', document_status: '' },
      metadataAuto: { discipline: false, project_fase: false, document_status: false },
    };
    recomputeFolderSuggestion(item);
    applyMetadataSuggestion(item);
    queue.push(item);
  }
  renderQueue();
}

function renderQueue() {
  const qEl = document.getElementById('queue');
  const actions = document.getElementById('actions');
  if (!qEl) return;

  if (!queue.length) {
    qEl.innerHTML = '';
    actions.style.display = 'none';
    return;
  }
  actions.style.display = '';

  qEl.innerHTML = queue.map(item => {
    const selectedFolder = writableFolders.find(f => f.id === item.folderId);
    const folderPicker = item.status === 'pending' ? renderFolderPicker(item, selectedFolder) : '';
    const pathPreview = (selectedFolder && item.status === 'pending')
      ? renderPathPreview(item, selectedFolder)
      : '';
    const metaRow = item.status === 'pending' ? renderMetaRow(item) : '';

    let statusLine = '';
    if (item.status === 'done') statusLine = '<div class="status ok">✓ Geüpload</div>';
    else if (item.status === 'done-warn') statusLine = `<div class="status warn">✓ Geüpload — ${escapeHtml(item.warn || 'metadata niet opgeslagen')}</div>`;
    else if (item.status === 'saving-props') statusLine = '<div class="status info">Metadata opslaan…</div>';
    else if (item.status === 'error') statusLine = `<div class="status err">✗ ${escapeHtml(item.error || 'Fout')}</div>`;

    const showProgress = item.status === 'uploading' || item.status === 'done' || item.status === 'done-warn' || item.status === 'saving-props';
    const progressBar = showProgress
      ? `<div class="progress"><div class="progress-bar" style="width:${item.progress}%"></div></div>`
      : '';

    const disabled = item.status !== 'pending' ? 'disabled' : '';

    return `
      <div class="queue-item" data-id="${item.id}">
        <div class="queue-head">
          <div class="queue-name" title="${escapeHtml(item.file.name)}">${escapeHtml(item.file.name)}</div>
          <div class="queue-size">${formatBytes(item.file.size)}</div>
          ${item.status === 'pending' ? `<button class="queue-remove" data-remove="${item.id}" title="Verwijderen">×</button>` : ''}
        </div>
        <div class="queue-body">
          <label>Beschrijving</label>
          <textarea data-field="description" data-id="${item.id}" ${disabled} placeholder="Optioneel…">${escapeHtml(item.description)}</textarea>
          ${metaRow}
          <label>Map</label>
          ${folderPicker}
          ${pathPreview}
          ${progressBar}
          ${statusLine}
        </div>
      </div>
    `;
  }).join('');

  // Event handlers
  qEl.querySelectorAll('[data-remove]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = Number(btn.getAttribute('data-remove'));
      queue = queue.filter(i => i.id !== id);
      renderQueue();
    });
  });
  qEl.querySelectorAll('textarea[data-field=description]').forEach(el => {
    el.addEventListener('input', () => {
      const id = Number(el.getAttribute('data-id'));
      const item = queue.find(i => i.id === id);
      if (!item) return;
      item.description = el.value;
      recomputeFolderSuggestion(item);
      // Focus herstellen op de textarea na re-render
      const activeId = document.activeElement?.getAttribute('data-id');
      renderQueue();
      if (activeId) {
        const ta = document.querySelector(`textarea[data-id="${activeId}"]`);
        if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
      }
    });
  });
  // Folder: klik op shortlist- of zoekresultaat
  qEl.querySelectorAll('[data-folder-pick]').forEach(el => {
    el.addEventListener('click', () => {
      const id = Number(el.getAttribute('data-id'));
      const fid = el.getAttribute('data-folder-pick');
      const item = queue.find(i => i.id === id);
      if (!item) return;
      item.folderId = fid;
      item.folderAuto = false;
      item.folderPickerOpen = false;
      item.folderSearch = '';
      // Metadata-auto-velden reseteren en opnieuw afleiden uit nieuwe pad
      for (const f of METADATA_FIELDS) {
        if (item.metadataAuto[f]) { item.metadata[f] = ''; item.metadataAuto[f] = false; }
      }
      applyMetadataSuggestion(item);
      renderQueue();
    });
  });
  // Folder: 'Wijzigen' / 'Verbergen' toggle
  qEl.querySelectorAll('[data-folder-toggle]').forEach(el => {
    el.addEventListener('click', () => {
      const id = Number(el.getAttribute('data-folder-toggle'));
      const item = queue.find(i => i.id === id);
      if (!item) return;
      item.folderPickerOpen = !item.folderPickerOpen;
      renderQueue();
      if (item.folderPickerOpen) {
        const input = document.querySelector(`input[data-folder-search="${id}"]`);
        if (input) input.focus();
      }
    });
  });
  // Folder: zoekveld live-filter
  qEl.querySelectorAll('input[data-folder-search]').forEach(el => {
    el.addEventListener('input', () => {
      const id = Number(el.getAttribute('data-folder-search'));
      const item = queue.find(i => i.id === id);
      if (!item) return;
      item.folderSearch = el.value;
      const caret = el.selectionStart;
      renderQueue();
      const again = document.querySelector(`input[data-folder-search="${id}"]`);
      if (again) { again.focus(); try { again.setSelectionRange(caret, caret); } catch (_) {} }
    });
  });
  // Metadata: wijziging her-scoret folders
  qEl.querySelectorAll('select[data-field^="meta-"]').forEach(el => {
    el.addEventListener('change', () => {
      const id = Number(el.getAttribute('data-id'));
      const field = el.getAttribute('data-field').replace(/^meta-/, '');
      const item = queue.find(i => i.id === id);
      if (!item || METADATA_FIELDS.indexOf(field) < 0) return;
      item.metadata[field] = el.value;
      item.metadataAuto[field] = false;
      recomputeFolderSuggestion(item);
      renderQueue();
    });
  });
}

function renderFolderPicker(item, selectedFolder) {
  // Geen keuze: shortlist + zoekveld zichtbaar
  // Wel keuze maar 'wijzigen' aan: shortlist + zoekveld zichtbaar, gekozen pad bovenaan
  // Wel keuze en niet aan het wijzigen: alleen gekozen pad met 'wijzigen' knop
  const hasChoice = !!selectedFolder;
  const pickerOpen = item.folderPickerOpen || !hasChoice;

  const currentBlock = hasChoice ? `
    <div class="folder-current">
      <span class="path" title="${escapeHtml(selectedFolder.path || selectedFolder.name)}">${escapeHtml(selectedFolder.path || selectedFolder.name)}</span>
      <button type="button" class="change-btn" data-folder-toggle="${item.id}">${pickerOpen ? 'Verbergen' : '🖉 Wijzigen'}</button>
    </div>` : '';

  if (hasChoice && !pickerOpen) {
    return `<div class="folder-picker">${currentBlock}</div>`;
  }

  const shortlist = item.folderShortlist || [];
  const searchResults = item.folderSearch ? filterFolders(item.folderSearch) : [];
  const anyMeta = METADATA_FIELDS.some(f => item.metadata[f]);

  // Fallback: bij weinig folders (≤20) of zonder score-match alle mappen als lijst tonen.
  // Gebruiker hoeft dan niet te weten dat er een zoekveld is.
  let fallbackList = [];
  const needFallback = !shortlist.length && !item.folderSearch;
  if (needFallback) {
    fallbackList = writableFolders.slice(0, Math.min(writableFolders.length, 20));
  }

  let shortlistBlock = '';
  if (shortlist.length) {
    shortlistBlock = `
      <div class="folder-hint">Voorstel op basis van metadata en bestandsnaam — klik om te kiezen:</div>
      <div class="folder-list">
        ${shortlist.slice(0, 5).map((s, i) => `
          <div class="folder-option ${s.folder.id === item.folderId ? 'selected' : ''}" data-folder-pick="${s.folder.id}" data-id="${item.id}">
            <span>${escapeHtml(s.folder.path || s.folder.name)}</span>
            ${i === 0 && s.folder.id === item.folderId ? '<span class="badge">TOP</span>' : ''}
          </div>`).join('')}
      </div>`;
  } else if (fallbackList.length) {
    const allShown = fallbackList.length >= writableFolders.length;
    shortlistBlock = `
      <div class="folder-hint">${allShown ? 'Beschikbare mappen' : 'Eerste ' + fallbackList.length + ' mappen (gebruik zoekveld voor meer)'}${anyMeta ? ' — geen directe metadata-match' : ''}:</div>
      <div class="folder-list">
        ${fallbackList.map(f => `
          <div class="folder-option ${f.id === item.folderId ? 'selected' : ''}" data-folder-pick="${f.id}" data-id="${item.id}">
            <span>${escapeHtml(f.path || f.name)}</span>
          </div>`).join('')}
      </div>`;
  } else if (!anyMeta) {
    shortlistBlock = `<div class="folder-hint">Vul Discipline/Fase/Status hierboven in voor een voorstel, of zoek hieronder.</div>`;
  }

  // Zoekveld alleen tonen als er meer dan ~20 mappen zijn OF de user er zelf iets in typt
  const showSearch = writableFolders.length > 20 || item.folderSearch;
  const searchBlock = showSearch ? `
    <input type="text" class="folder-search" data-folder-search="${item.id}"
           placeholder="Zoek in alle ${writableFolders.length} mappen…"
           value="${escapeHtml(item.folderSearch || '')}">
    ${searchResults.length ? `
      <div class="folder-list">
        ${searchResults.map(f => `
          <div class="folder-option ${f.id === item.folderId ? 'selected' : ''}" data-folder-pick="${f.id}" data-id="${item.id}">
            <span>${escapeHtml(f.path || f.name)}</span>
          </div>`).join('')}
      </div>` : (item.folderSearch ? '<div class="folder-hint">Geen resultaten.</div>' : '')}
  ` : '';

  return `<div class="folder-picker">${currentBlock}${shortlistBlock}${searchBlock}</div>`;
}

function renderMetaRow(item) {
  const parts = METADATA_FIELDS.map(field => {
    const val = item.metadata[field] || '';
    const missing = !val;
    const auto = item.metadataAuto[field];
    const opts = ['<option value="">— kies —</option>'].concat(
      (ENUM_VALUES[field] || []).map(v =>
        `<option value="${escapeHtml(v)}" ${v === val ? 'selected' : ''}>${escapeHtml(v)}</option>`
      )
    ).join('');
    const icon = missing ? '<span class="warn-icon" title="Verplicht">⚠</span>' : '';
    const cls = missing ? 'warn-select' : '';
    const autoAttr = auto ? ' data-auto="1" title="Automatisch ingevuld op basis van mapstructuur"' : '';
    return `
      <div>
        <label>${escapeHtml(FIELD_LABEL[field])} ${icon}</label>
        <select class="${cls}" data-field="meta-${field}" data-id="${item.id}"${autoAttr}>${opts}</select>
      </div>`;
  }).join('');
  return `<div class="meta-row">${parts}</div>`;
}

// ============================================================
//  Config-modal (metadata-regels instellen — admin)
// ============================================================
function openConfigModal() {
  // Maak een kopie van de huidige regels voor in-modal editing (cancel = discard)
  const draft = { rules: uploadConfig.rules.map(r => ({ depth: r.depth, field: r.field, map: r.map ? Object.assign({}, r.map) : null })) };
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.addEventListener('click', (e) => { if (e.target === backdrop) backdrop.remove(); });

  const modal = document.createElement('div');
  modal.className = 'modal';
  backdrop.appendChild(modal);
  document.body.appendChild(backdrop);

  const render = () => {
    const fieldOpts = METADATA_FIELDS.map(f => `<option value="${f}">${escapeHtml(FIELD_LABEL[f])}</option>`).join('');
    const rulesHtml = draft.rules.length === 0
      ? '<p class="sub" style="margin:12px 0;">Nog geen regels. Voeg er een toe om metadata automatisch te laten invullen op basis van de mapstructuur.</p>'
      : draft.rules.map((r, i) => `
          <div class="rule-row">
            <input type="number" min="1" max="10" step="1" value="${r.depth}" data-rule-depth="${i}" title="Mapniveau (1 = eerste map onder projectroot)">
            <select data-rule-field="${i}">
              ${METADATA_FIELDS.map(f => `<option value="${f}" ${f === r.field ? 'selected' : ''}>${escapeHtml(FIELD_LABEL[f])}</option>`).join('')}
            </select>
            <button class="rule-del" data-rule-del="${i}" title="Regel verwijderen">×</button>
          </div>`).join('');

    modal.innerHTML = `
      <h2>Metadata-regels</h2>
      <p class="sub">Per mapniveau bepaal je welk veld wordt afgeleid. Niveau 1 = eerste map onder de projectroot.</p>
      <div id="rules-list">${rulesHtml}</div>
      <button type="button" class="add-rule" id="add-rule-btn">+ Regel toevoegen</button>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="cfg-cancel">Annuleren</button>
        <button class="btn btn-primary" id="cfg-save">Opslaan</button>
      </div>
      <div id="cfg-msg" style="margin-top:8px;font-size:12px;"></div>
    `;

    modal.querySelectorAll('input[data-rule-depth]').forEach(el => {
      el.addEventListener('input', () => {
        const i = Number(el.getAttribute('data-rule-depth'));
        const n = parseInt(el.value, 10);
        if (Number.isFinite(n) && n >= 1 && n <= 10) draft.rules[i].depth = n;
      });
    });
    modal.querySelectorAll('select[data-rule-field]').forEach(el => {
      el.addEventListener('change', () => {
        const i = Number(el.getAttribute('data-rule-field'));
        draft.rules[i].field = el.value;
      });
    });
    modal.querySelectorAll('button[data-rule-del]').forEach(el => {
      el.addEventListener('click', () => {
        const i = Number(el.getAttribute('data-rule-del'));
        draft.rules.splice(i, 1);
        render();
      });
    });
    modal.querySelector('#add-rule-btn').addEventListener('click', () => {
      const nextDepth = (draft.rules[draft.rules.length - 1]?.depth || 0) + 1;
      const usedFields = new Set(draft.rules.map(r => r.field));
      const firstFree = METADATA_FIELDS.find(f => !usedFields.has(f)) || 'discipline';
      draft.rules.push({ depth: nextDepth, field: firstFree });
      render();
    });
    modal.querySelector('#cfg-cancel').addEventListener('click', () => backdrop.remove());
    modal.querySelector('#cfg-save').addEventListener('click', async () => {
      const msgEl = modal.querySelector('#cfg-msg');
      const saveBtn = modal.querySelector('#cfg-save');
      saveBtn.disabled = true;
      msgEl.style.color = '#555';
      msgEl.textContent = 'Opslaan…';
      // Valideer: unieke depth
      const seen = new Set();
      for (const r of draft.rules) {
        if (seen.has(r.depth)) {
          msgEl.style.color = 'var(--af-rood)';
          msgEl.textContent = 'Elk mapniveau mag maar één keer voorkomen.';
          saveBtn.disabled = false;
          return;
        }
        seen.add(r.depth);
      }
      const previousRules = uploadConfig.rules;
      uploadConfig.rules = draft.rules;
      try {
        await saveUploadConfig();
        // Her-suggestie voor pending items
        for (const item of queue) {
          if (item.status !== 'pending') continue;
          for (const f of METADATA_FIELDS) {
            if (item.metadataAuto[f]) { item.metadata[f] = ''; item.metadataAuto[f] = false; }
          }
          applyMetadataSuggestion(item);
        }
        renderQueue();
        backdrop.remove();
      } catch (e) {
        uploadConfig.rules = previousRules;
        msgEl.style.color = 'var(--af-rood)';
        msgEl.textContent = e.message;
        saveBtn.disabled = false;
      }
    });
  };

  render();
}

function renderPathPreview(item, folder) {
  // Pad zelf staat al in de folder-picker — hier alleen metadata-samenvatting
  const tags = METADATA_FIELDS.map(field => {
    const v = item.metadata[field];
    const lbl = escapeHtml(FIELD_LABEL[field]);
    if (v) {
      const cls = item.metadataAuto[field] ? 'auto-tag' : '';
      const suffix = item.metadataAuto[field] ? ' (auto)' : '';
      return `<span class="${cls}">${lbl}: ${escapeHtml(v)}${suffix}</span>`;
    }
    return `<span class="missing-tag">${lbl}: — ontbreekt</span>`;
  }).join(' · ');
  return `<div class="path-preview">${tags}</div>`;
}

// ============================================================
//  Helpers
// ============================================================
function waitForWorkspaceAPI(maxWait) {
  return new Promise(function (resolve, reject) {
    let api = window.WorkspaceAPI || window.Extensions || window.TrimbleConnectWorkspace;
    if (api) return resolve(api);
    const start = Date.now();
    const interval = setInterval(function () {
      api = window.WorkspaceAPI || window.Extensions || window.TrimbleConnectWorkspace;
      if (api) { clearInterval(interval); resolve(api); }
      else if (Date.now() - start > maxWait) { clearInterval(interval); reject(new Error('Workspace API timeout')); }
    }, 200);
  });
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function formatBytes(n) {
  if (n < 1024) return n + ' B';
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
  if (n < 1024 * 1024 * 1024) return (n / 1024 / 1024).toFixed(1) + ' MB';
  return (n / 1024 / 1024 / 1024).toFixed(2) + ' GB';
}

// ============================================================
//  Start
// ============================================================
document.addEventListener('DOMContentLoaded', function () {
  init().catch(function (e) {
    console.error('[Init] Fout:', e);
    const msg = String(e && e.message || e || '');
    // Hub 'Toegang geweigerd' of '403' → lock-scherm; overige fouten → generieke fatal
    const isAccessDenied = /toegang|access|403|geweigerd|denied|forbidden/i.test(msg);
    const loading = document.getElementById('loading');
    if (isAccessDenied) {
      loading.innerHTML = '<div class="fatal"><h2 style="margin:0 0 8px">Geen toegang</h2>'
        + '<p style="color:#555;margin:0 0 12px">Je hebt geen actieve licentie voor deze extensie in dit project.</p>'
        + '<p style="font-size:12px;color:#888">Details: ' + escapeHtml(msg) + '</p>'
        + '<p style="margin-top:16px"><a href="mailto:info@atfielt.nl">info@atfielt.nl</a></p></div>';
    } else {
      loading.innerHTML = '<div class="fatal"><h2 style="margin:0 0 8px">Fout bij laden</h2>'
        + '<p style="color:#555">' + escapeHtml(msg) + '</p>'
        + '<p style="margin-top:16px;font-size:12px;color:#888">Probeer de extensie te sluiten en opnieuw te openen. Blijft het probleem? <a href="mailto:info@atfielt.nl">info@atfielt.nl</a></p></div>';
    }
  });
});
